name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: MSBuild kurulumu
        uses: microsoft/setup-msbuild@v2

      - name: Çözümü derle
        run: msbuild "asal sayi toplami.sln" /p:Configuration=Release /verbosity:minimal
